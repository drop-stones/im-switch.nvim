name: integration-test

on:
  workflow_dispatch:
  push:
    branches: [main, feat/*]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    name: Integration test on ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Run build (download CLI)
        run: nvim -l -e "require('im-switch.build').setup()"

      - name: Verify CLI is installed
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            CLI_NAME="im-switch.exe"
          else
            CLI_NAME="im-switch"
          fi
          CLI_PATH=$(find . -name "$CLI_NAME" -type f | head -1)
          if [ -z "$CLI_PATH" ]; then
            echo "ERROR: CLI binary not found"
            exit 1
          fi
          echo "Found CLI at: $CLI_PATH"
          "$CLI_PATH" --version
