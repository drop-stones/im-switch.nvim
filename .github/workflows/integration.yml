name: integration-test

on:
  workflow_dispatch:
  push:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
          - os: windows-latest
          - os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    name: Integration test on ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Run build (download CLI)
        run: nvim --headless -c "set rtp+=." -c "lua require('im-switch.build').setup()" +qa

      - name: Verify CLI is installed
        shell: bash
        run: |
          CLI_PATH=$(nvim --headless -c "set rtp+=." -c "lua print(require('im-switch.utils.path').get_cli_path())" +qa 2>&1 | tail -1)
          if [ -z "$CLI_PATH" ] || [ ! -f "$CLI_PATH" ]; then
            echo "ERROR: CLI binary not found at: $CLI_PATH"
            exit 1
          fi
          echo "Found CLI at: $CLI_PATH"
          "$CLI_PATH" --version

      - name: Run checkhealth
        shell: bash
        run: |
          LUA_SETUP='
            local opts = {}
            if vim.fn.has("mac") == 1 then
              opts.macos = { default_im = "com.apple.keylayout.ABC" }
            elseif vim.fn.has("win32") == 1 then
              opts.windows = {}
            else
              opts.linux = { default_im = "keyboard-us" }
            end
            require("im-switch.options").setup(opts)
          '
          OUTPUT=$(nvim --headless -c "set rtp+=." -c "lua $LUA_SETUP" -c "checkhealth im-switch" -c "%print" +qa 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "ERROR"; then
            echo "::error::checkhealth reported errors"
            exit 1
          fi
