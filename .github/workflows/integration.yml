name: integration-test

on:
  workflow_dispatch:
  push:
    branches: [main, feat/*]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    name: Integration test on ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Run build (download CLI)
        run: nvim --headless -c "set rtp+=." -c "lua require('im-switch.build').setup()" +qa

      - name: Verify CLI is installed
        shell: bash
        run: |
          CLI_PATH=$(nvim --headless -c "set rtp+=." -c "lua print(require('im-switch.utils.path').get_cli_path())" +qa 2>&1 | tail -1)
          if [ -z "$CLI_PATH" ] || [ ! -f "$CLI_PATH" ]; then
            echo "ERROR: CLI binary not found at: $CLI_PATH"
            exit 1
          fi
          echo "Found CLI at: $CLI_PATH"
          "$CLI_PATH" --version
