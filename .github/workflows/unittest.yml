name: unittest

on:
  workflow_dispatch:
  push:
    branches: [main, feat/*]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Run unit tests
        run: bash scripts/test
